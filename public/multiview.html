<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multivista en Vivo — Liceo LTP Campanario</title>
  <style>
    :root {
      --bg-dark: #030712;
      --card-bg: #0f172a;
      --border-color: #1e293b;
      --primary: #4f46e5;
      --primary-glow: rgba(79, 70, 229, 0.15);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --success: #10b981;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      margin: 0;
      padding: 16px;
      line-height: 1.5;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-color);
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      margin: 0 0 8px 0;
      color: #fff;
    }

    .badge-live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: rgba(16, 185, 129, 0.1);
      color: var(--success);
      padding: 6px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .dot {
      width: 8px;
      height: 8px;
      background-color: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 12px var(--success); }
      100% { transform: scale(0.9); opacity: 0.6; }
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 8px;
    }

    .grid-info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 480px) {
      .grid-info {
        grid-template-columns: 1fr;
      }
    }

    .info-group label {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .info-group div {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
    }

    .content-box {
      background-color: rgba(3, 7, 18, 0.4);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px;
      min-height: 50px;
      font-size: 14px;
      color: var(--text-main);
      white-space: pre-wrap;
      word-break: break-word;
      transition: all 0.2s;
    }

    .content-box:empty::before {
      content: "(Esperando escritura...)";
      color: var(--text-muted);
      font-style: italic;
    }

    .content-box.updated {
      border-color: var(--primary);
      box-shadow: 0 0 10px var(--primary-glow);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🏛️ Liceo Técnico Profesional Campanario</h1>
      <div class="badge-live">
        <span class="dot"></span>
        <span id="status-text">Visualizando en vivo</span>
      </div>
    </header>

    <!-- Datos del Entrevistado -->
    <div class="card">
      <div class="card-title">👤 Datos del Entrevistado</div>
      <div class="grid-info">
        <div class="info-group">
          <label>Nombre</label>
          <div id="v-nombre">-</div>
        </div>
        <div class="info-group">
          <label>RUT</label>
          <div id="v-rut">-</div>
        </div>
        <div class="info-group">
          <label>Curso / Función</label>
          <div id="v-curso">-</div>
        </div>
        <div class="info-group">
          <label>Cita</label>
          <div id="v-cita">-</div>
        </div>
      </div>
    </div>

    <!-- Detalles de la Entrevista -->
    <div class="card">
      <div class="card-title">📝 Objetivo de la Cita</div>
      <div class="content-box" id="v-objetivo"></div>
    </div>

    <div class="card">
      <div class="card-title">🔍 Motivos / Antecedentes</div>
      <div class="content-box" id="v-motivo"></div>
    </div>

    <div class="card">
      <div class="card-title">🤝 Acuerdos / Compromisos</div>
      <div class="content-box" id="v-acuerdos"></div>
    </div>

    <div class="card">
      <div class="card-title">💡 Observaciones Generales</div>
      <div class="content-box" id="v-obs"></div>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const session = urlParams.get('session');
    const statusText = document.getElementById('status-text');
    const liveBadge = document.querySelector('.badge-live');

    if (!session) {
      statusText.textContent = "Sin sesión activa";
      liveBadge.style.backgroundColor = "rgba(239, 68, 68, 0.1)";
      liveBadge.style.color = "#ef4444";
      liveBadge.style.borderColor = "rgba(239, 68, 68, 0.2)";
      document.querySelector('.dot').style.backgroundColor = "#ef4444";
      document.querySelector('.dot').style.boxShadow = "none";
      document.querySelector('.dot').style.animation = "none";
    } else {
      // Iniciar polling de datos cada 1 segundo
      setInterval(fetchLiveState, 1000);
      fetchLiveState();
    }

    const prevValues = {};

    async function fetchLiveState() {
      try {
        const res = await fetch(`/api/multivista/live?session=${encodeURIComponent(session)}`);
        if (!res.ok) throw new Error("Error en petición");
        const data = await res.json();
        
        if (data && data.sessionId) {
          updateField('v-nombre', data.nombre);
          updateField('v-rut', data.rut);
          updateField('v-curso', `${data.cargo || ''} - ${data.curso || ''}`);
          updateField('v-cita', `${data.fecha || ''} ${data.hora || ''} (con ${data.resp || 'responsable'})`);
          
          updateContentBox('v-objetivo', data.objetivo);
          updateContentBox('v-motivo', data.motivo);
          updateContentBox('v-acuerdos', data.acuerdos);
          updateContentBox('v-obs', data.obs);
          
          statusText.textContent = "Visualizando en vivo";
        } else {
          statusText.textContent = "Esperando sesión...";
        }
      } catch (err) {
        console.error("Error fetching live state:", err);
        statusText.textContent = "Error de conexión";
      }
    }

    function updateField(id, val) {
      const el = document.getElementById(id);
      if (el) {
        el.textContent = val || '-';
      }
    }

    function updateContentBox(id, val) {
      const el = document.getElementById(id);
      if (el) {
        const cleanVal = val || '';
        if (prevValues[id] !== cleanVal) {
          el.textContent = cleanVal;
          prevValues[id] = cleanVal;
          
          // Efecto visual de actualización
          el.classList.add('updated');
          setTimeout(() => el.classList.remove('updated'), 600);
        }
      }
    }
  </script>
</body>
</html>
